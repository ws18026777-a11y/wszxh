<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>美式释意·全能修改器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: rgba(0, 0, 0, 0.3);
            color: #000000;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .frame {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: none;
            z-index: 20;
        }
        .menu-btn {
            background: #90EE90;
            border: 1px solid #2e7d32;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: 0.2s;
        }
        .menu-btn:active {
            transform: scale(0.96);
        }
        .app-title {
            font-size: 20px;
            font-weight: 800;
            color: #000;
            letter-spacing: 1px;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 280px;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.25s ease-out;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: none;
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-header {
            padding: 24px 20px 12px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            border-bottom: none;
        }
        .drawer-item {
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 500;
            border-left: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
        }
        .drawer-item:active {
            background: #90EE90;
        }
        .submenu-drawer {
            padding-left: 32px;
            background: rgba(0, 0, 0, 0.05);
            display: none;
        }
        .submenu-drawer .drawer-item {
            padding: 10px 16px;
            font-size: 14px;
        }
        .drawer-close {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 26px;
            cursor: pointer;
            color: #000;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            display: none;
        }
        .overlay.show {
            display: block;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 0;
            padding: 16px 18px;
            margin-bottom: 16px;
            border: none;
            backdrop-filter: blur(4px);
            overflow-x: hidden;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            border-left: 4px solid #90EE90;
            padding-left: 12px;
            color: #000;
        }
        .content-pane {
            display: none;
        }
        .active-pane {
            display: block;
        }

        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .input-row .row-name {
            font-size: 14px;
            font-weight: 500;
            color: #000;
            min-width: 100px;
        }
        .input-row .input-wrapper {
            flex: 2;
            display: flex;
            gap: 8px;
            min-width: 180px;
        }
        .input-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #90EE90;
            border-radius: 30px;
            padding: 8px 12px;
            font-size: 14px;
            color: #000;
            min-width: 80px;
        }
        .input-row button {
            background: #90EE90;
            border: 1px solid #2e7d32;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-row button:active {
            transform: scale(0.96);
        }

        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 4px 0;
        }
        .action-row .row-name {
            font-size: 14px;
            font-weight: 500;
            color: #000;
        }
        .action-btn {
            background: #90EE90;
            border: 1px solid #2e7d32;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            min-width: 80px;
            text-align: center;
            color: #000;
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        .basketball-btn {
            background: #90EE90;
            border: 2px solid #2e7d32 !important;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 80px;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .basketball-btn:hover {
            background: #7bda7b;
        }
        .basketball-btn:active {
            transform: scale(0.96);
        }
        .basketball-icon {
            font-size: 24px;
            line-height: 1;
        }
        .toggle-status-btn {
            background: #90EE90;
            border: 2px solid #2e7d32;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 80px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .toggle-status-btn:hover {
            background: #7bda7b;
        }

        .switch-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
        }
        .switch-label {
            font-size: 16px;
            font-weight: bold;
            color: #000;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 33px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 43px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked+.slider {
            background-color: #90EE90;
        }
        input:checked+.slider:before {
            transform: translateX(26px);
        }
        .status-text {
            margin-left: 10px;
            font-size: 14px;
            color: #000;
        }

        .dual-input-section {
            margin: 16px 0;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group input {
            width: 100% !important;
            padding: 8px 14px !important;
            border-radius: 30px !important;
            border: 2px solid #90EE90 !important;
            background: #ffffff !important;
            color: #000 !important;
            font-size: 14px !important;
            outline: none !important;
            transition: 0.2s !important;
        }
        .input-group input:focus {
            border-color: #2e7d32 !important;
            box-shadow: 0 0 8px rgba(144, 238, 144, 0.4) !important;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .setting-label {
            font-size: 15px;
            color: #000;
        }
        .setting-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-group h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #000;
        }
        .toggle-switch {
            width: 44px;
            height: 22px;
            background: #ccc;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: #90EE90;
        }
        .toggle-switch::after {
            content: "";
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 23px;
        }

        .tendency-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
        }
        .tendency-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 8px 16px;
            border: none;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tendency-item span {
            font-size: 14px;
            font-weight: 500;
            color: #000;
            min-width: 110px;
        }
        .tendency-slider {
            flex: 2;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .tendency-slider input {
            flex: 1;
            min-width: 100px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 30px;
            height: 6px;
            -webkit-appearance: none;
        }
        .tendency-slider input:focus {
            outline: none;
        }
        .tendency-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #90EE90;
            border: 1px solid #2e7d32;
            cursor: pointer;
        }
        .tendency-value {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #90EE90;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 13px;
            min-width: 55px;
            text-align: center;
            font-family: monospace;
            white-space: nowrap;
        }
        .style-selector {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 30px;
            border: none;
        }
        .style-selector label {
            font-weight: bold;
            color: #000;
        }
        .style-selector select {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #90EE90;
            border-radius: 30px;
            padding: 6px 12px;
            color: #000;
        }
        .message-text {
            margin-top: 8px;
            font-size: 14px;
            color: #000;
            margin-bottom: 12px;
        }

        /* 球衣功能专用样式 */
        .jersey-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .jersey-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .jersey-section h3 {
            font-size: 18px;
            color: #2e7d32;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .jersey-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .jersey-row select,
        .jersey-row input,
        .jersey-row button {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #90EE90;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            font-size: 14px;
        }
        .jersey-row button {
            background: #90EE90;
            font-weight: bold;
            cursor: pointer;
            border-color: #2e7d32;
            transition: 0.2s;
        }
        .jersey-row button:active {
            transform: scale(0.96);
        }
        .jersey-status {
            font-size: 15px;
            color: #000;
            padding: 4px 0;
        }
        .jersey-status b {
            color: #2e7d32;
        }
        .jersey-msg {
            margin-top: 8px;
            padding: 8px 14px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.05);
            font-size: 14px;
            color: #000;
        }
        .jersey-msg.error {
            color: #d32f2f;
            background: rgba(211, 47, 47, 0.1);
        }
        .jersey-color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 12px;
            margin: 10px 0;
        }
        .jersey-color-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 4px 8px;
        }
        .jersey-color-item label {
            min-width: 70px;
            color: #000;
            font-weight: 500;
        }
        .jersey-color-item input {
            width: 72px;
            padding: 6px 8px;
            border-radius: 20px;
            border: 1px solid #90EE90;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            text-align: center;
            font-size: 14px;
            flex: 1;
            min-width: 60px;
        }
        .jersey-color-item button {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 20px;
            min-width: 46px;
            background: #90EE90;
            border: 1px solid #2e7d32;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin: 2px;
        }
        .jersey-color-item button:active {
            transform: scale(0.96);
        }
        .jersey-action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .jersey-action-group button {
            flex: 1;
            min-width: 100px;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #2e7d32;
            background: #90EE90;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .jersey-action-group button:active {
            transform: scale(0.96);
        }
        .jersey-hint {
            font-size: 12px;
            color: #666;
            margin: 4px 0 8px;
        }
        .jersey-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
            margin: 16px 0;
        }
        @media (max-width: 480px) {
            .jersey-color-grid {
                grid-template-columns: 1fr;
            }
            .jersey-color-item input {
                width: 60px;
            }
        }

        /* 球场与Logo共用样式 - 边框一直显示 */
        .double-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .double-row .col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .double-row .col label {
            font-size: 14px;
            color: #000;
            font-weight: 500;
        }
        .double-row .col input {
            width: 100%;
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #90EE90;
            background: #ffffff;
            color: #000;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .double-row .col input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(144, 238, 144, 0.4);
        }
        .double-row .col button {
            width: 100%;
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #2e7d32;
            background: #90EE90;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            color: #000;
            transition: 0.2s;
        }
        .double-row .col button:hover {
            background: #7bda7b;
        }
        .double-row .col button:active {
            transform: scale(0.96);
        }
        .hint {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-bottom: 8px;
        }

        /* 街头球馆下拉框 */
        #streetCourtTypeSelect {
            width: 100%;
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #90EE90;
            background: #ffffff;
            color: #000;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        #streetCourtTypeSelect:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(144, 238, 144, 0.4);
        }

        /* 球队下拉框 */
        #courtTeamSelect {
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #90EE90;
            background: #ffffff;
            color: #000;
            font-size: 14px;
            flex: 1;
            outline: none;
            transition: 0.2s;
        }
        #courtTeamSelect:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(144, 238, 144, 0.4);
        }

        /* 状态显示 */
        .status-line {
            font-size: 15px;
            color: #000;
            padding: 4px 0;
            text-align: center;
        }
        .status-line b {
            color: #2e7d32;
        }

        /* Logo专用 */
        .logo-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .logo-row select,
        .logo-row input {
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #90EE90;
            background: #ffffff;
            color: #000;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            flex: 1;
        }
        .logo-row input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(144, 238, 144, 0.4);
        }
        .logo-row button {
            padding: 8px 14px;
            border-radius: 30px;
            border: 2px solid #2e7d32;
            background: #90EE90;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            color: #000;
            transition: 0.2s;
        }
        .logo-row button:hover {
            background: #7bda7b;
        }
        .logo-row button:active {
            transform: scale(0.96);
        }
        .logo-status {
            font-size: 15px;
            color: #000;
            padding: 4px 0;
        }
        .logo-status b {
            color: #2e7d32;
        }

        /* 球场类型选择 - 小按钮网格 */
        .court-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 8px 0;
        }
        .court-type-grid button {
            padding: 6px 8px;
            border-radius: 16px;
            border: 1px solid #2e7d32;
            background: rgba(255,255,255,0.7);
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            color: #000;
        }
        .court-type-grid button:active { transform: scale(0.96); }
        .court-type-grid button.active { 
            background: #90EE90; 
            border-color: #1b5e20;
            font-weight: bold;
        }

        /* 小按钮 */
        .small-btn {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 20px;
            border: 1px solid #2e7d32;
            background: #90EE90;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .small-btn:active { transform: scale(0.96); }

        /* 全局按钮边框统一 */
        .action-btn {
            border: 2px solid #2e7d32 !important;
        }
        .action-btn:hover {
            background: #7bda7b;
        }
        .toggle-status-btn {
            border: 2px solid #2e7d32 !important;
        }
        .toggle-status-btn:hover {
            background: #7bda7b;
        }
        .small-btn {
            border: 2px solid #2e7d32 !important;
        }
        .small-btn:hover {
            background: #7bda7b;
        }
        /* 授权覆盖层 */
        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: system-ui;
        }
        #authOverlay .box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 32px;
            text-align: center;
            width: 85%;
            max-width: 400px;
        }
        #authOverlay .device {
            background: #1c1c24;
            padding: 12px;
            border-radius: 14px;
            margin: 16px 0;
            color: #0f0;
            font-family: monospace;
            word-break: break-all;
            font-size: 14px;
        }
        #authOverlay input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            box-sizing: border-box;
            background: #0c0c12;
            color: white;
            border: 1px solid #3a3a44;
            outline: none;
        }
        #authOverlay input:focus { border-color: #007aff; }
        #authOverlay button {
            width: 100%;

    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
    <script>

        const PUBLIC_KEY_B64 = "1YZsKn91m+iA34QxPqvPzWGaJJ6JEGqLP9Fu5sCL/6g=";

        function fromBase64(b64) { return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
        const publicKey = fromBase64(PUBLIC_KEY_B64);

        function getDeviceId() {
            if (typeof h5gg !== 'undefined') {
                if (h5gg.getDeviceUUID) {
                    var uuid = h5gg.getDeviceUUID();
                    if (uuid && uuid.length > 0) return { id: uuid, source: 'h5gg' };
                }
                if (h5gg.deviceId) {
                    var did = h5gg.deviceId;
                    if (did && did.length > 0) return { id: did, source: 'h5gg' };
                }
            }
            let components = [
                navigator.userAgent,
                screen.width,
                screen.height,
                screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.platform,
                navigator.language,
                new Date().getTimezoneOffset()
            ];
            try {
                let canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                let ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('指纹', 2, 15);
                components.push(canvas.toDataURL());
            } catch(e) {}
            try {
                let canvas = document.createElement('canvas');
                let gl = canvas.getContext('webgl');
                if (gl) {
                    let info = gl.getExtension('WEBGL_debug_renderer_info');
                    if (info) {
                        components.push(gl.getParameter(info.UNMASKED_RENDERER_WEBGL));
                        components.push(gl.getParameter(info.UNMASKED_VENDOR_WEBGL));
                    }
                }
            } catch(e) {}
            let s = components.join('||');
            let hash = 0;
            for (let i = 0; i < s.length; i++) { hash = ((hash << 5) - hash) + s.charCodeAt(i); hash |= 0; }
            return { id: "FP_" + Math.abs(hash).toString(16), source: 'fingerprint' };
        }

        function verifySignature(deviceId, sigB64) {
            try {
                let sig = Uint8Array.from(atob(sigB64), c=>c.charCodeAt(0));
                let msg = new TextEncoder().encode(deviceId);
                return nacl.sign.detached.verify(msg, sig, publicKey);
            } catch(e) { return false; }
        }

        const STORAGE_KEYS = ["s1","s2","s3"];
        function getStoredSig() {
            let sigs = [];
            for (let k of STORAGE_KEYS) { let v = localStorage.getItem(k); if (v) sigs.push(v); }
            if (sigs.length === 0) return null;
            let counts = {};
            sigs.forEach(s => { counts[s] = (counts[s] || 0) + 1; });
            let maxCount = 0, bestSig = null;
            for (let [sig, cnt] of Object.entries(counts)) { if (cnt > maxCount) { maxCount = cnt; bestSig = sig; } }
            return maxCount >= 2 ? bestSig : null;
        }
        function setStoredSig(sig) { for (let k of STORAGE_KEYS) localStorage.setItem(k, sig); }
        function clearStoredSig() { for (let k of STORAGE_KEYS) localStorage.removeItem(k); }

        function isActivated() {
            let storedSig = getStoredSig();
            if (!storedSig) return false;
            return verifySignature(getDeviceId().id, storedSig);
        }

        function doActivate(inputCode) {
            let devId = getDeviceId().id;
            if (!inputCode || inputCode.trim() === '') {
                document.getElementById('errorMsg').textContent = '请先输入激活码';
                document.getElementById('errorMsg').style.display = 'block';
                return false;
            }
            if (verifySignature(devId, inputCode.trim())) {
                setStoredSig(inputCode.trim());
                document.getElementById('errorMsg').style.display = 'none';
                return true;
            } else {
                document.getElementById('errorMsg').textContent = '激活码无效，请检查后重试';

                return false;
            }
        }

        // ---------- 辅助函数 ----------
        function resolvePointerChain(baseModuleOffset, offsets) {
            if (!X || X.length === 0) {
                console.warn("resolvePointerChain: X未初始化");
                return 0;
            }
            try {
                let addr = Number(X[0].start) + baseModuleOffset;
                for (let i = 0; i < offsets.length; i++) {
                    addr = Number(h5gg.getValue(addr, 'I64'));
                    if (!addr) return 0;
                    addr += offsets[i];
                }
                return addr;
            } catch (e) {

            }
        }

        // ---------- 自动锁定六项地址 ----------
        function setupSixLocks() {
            if (!X || X.length === 0) {
                console.warn("X未初始化，跳过六项锁定");

            }
            try {
                const baseOffset = 0x16E0BA8;
                const offsetsList = [0x22C, 0x214, 0x16C, 0x154, 0x13C, 0x124];

                function lock() {
                    addresses.forEach(addr => {
                        if (addr) h5gg.setValue(addr, 5, 'I32');
                    });
                }
                lock();
                let interval = setInterval(lock, 10);
                lockSixIntervals.push(interval);

        function startHack() {
            if (typeof h5gg === 'undefined') {
                console.warn("H5GG 未加载");
                return;
            }
            if (!requireAuth()) return;

            let retries = 0;
            const maxRetries = 10;
            const interval = 500;
            let foundProcess = null;

            function tryStart() {
                for (let pname of PROCESS_CANDIDATES) {
                    try {
                        let ranges = h5gg.getRangesList(pname);
                        if (ranges && ranges.length > 0) {
                            foundProcess = pname;
                            console.log(`✅ 找到进程: ${pname}`);
                            break;
                        }
                    } catch(e) {}
                }

                if (!foundProcess) {
                    retries++;
                    if (retries < maxRetries) {
                        console.log(`⏳ 未找到可用进程，第 ${retries} 次重试...`);
                        setTimeout(tryStart, interval);
                    } else {
                        alert("无法识别游戏进程，请确保游戏已启动且 H5GG 已附加。");
                    }
                    return;
                }

                // 赋值给全局 X

                var base = Number(X[0].start);

                // 启动所有锁定
                setupSixLocks();

                // 0xFB22A8 + 0x6E0
                let a = resolvePointerChain(0xFB22A8, [0x6E0]);
                if (a) setInterval(() => { if (requireAuth()) h5gg.setValue(a, 1, 'I32'); }, 10);

                // 0x106EE98
                let bBase = base + (0x1060000 + 0xEE98);
                let dB = Number(h5gg.getValue(bBase, 'I64'));
                if (dB) {
                    let b1 = dB + 0x534, b2 = dB + 0x5B8;
                    setInterval(() => {

                            h5gg.setValue(b1, 130.0, 'F32');
                            h5gg.setValue(b2, -999999999.0, 'F32');

                // 0x10ACE28

                    let vals20 = [1,1,1,1,3,1,1,1,1,3,1,1,1,1,3,1,1,1,1,3];

        function buildTendencyPanel() {
            function getAutoTendencyBase() {
                try {
                    var X2 = h5gg.getRangesList('NBA 2K20');
                    if (!X2 || X2.length === 0) return 0;
                    var base = Number(X2[0].start);
                    var v1 = Number(h5gg.getValue(base + 0x23E24D0, 'I64'));
                    if (!v1) return 0;
                    var v2 = Number(h5gg.getValue(v1 + 0x1B8, 'I64'));
                    if (!v2) return 0;
                    var v3 = Number(h5gg.getValue(v2 + 0x0, 'I64'));
                    if (!v3) return 0;
                    return v3 + 0x196;
                } catch(e) {
                    return 0;
                }
            }

            if (!tendencyBase) {
                tendencyBase = getAutoTendencyBase();
                if (tendencyBase) {
                    localStorage.setItem('tendencyBase', tendencyBase.toString());
                }

            var targetAddr = tendencyBase ? tendencyBase + 993436 : 0;

                grid.appendChild(div);

                if (slider) {

                            var num = parseFloat(val);
                            slider.value = Math.min(1, Math.max(0, num));
                            valueSpan.innerText = num.toFixed(2);
                        }
                    } catch(e) {}

                    slider.addEventListener('input', function() {

                for (let ch of str) {
                    if (!courtCharMap[ch]) {
                        courtMsg.textContent = '❌ 非法字符: "' + ch + '" (仅支持数字 0-9)';
                        return;
                    }
                }
                if (!addr) { courtMsg.textContent = '❌ 地址无效'; return; }
                let cur = addr;
                for (let i = 0; i < str.length; i++) {
                    if (!writeI16(cur, courtCharMap[str[i]])) {
                        courtMsg.textContent = '❌ ' + name + '写入失败';
                        return;
                    }
                    cur += 2n;
                }
                if (!writeI16(cur, 0)) {
                    courtMsg.textContent = '❌ ' + name + '补0失败';
                    return;
                }
                courtMsg.textContent = '✅ ' + name + ' "' + str + '" 写入成功';
            }

            function writeStreetSingle(addr, val, name, offset) {
                if (isNaN(val)) { courtMsg.textContent = '❌ 请输入有效数字'; return; }
                if (!addr) { courtMsg.textContent = '❌ 地址无效'; return; }
                if (writeI8(addr, val)) {
                    courtMsg.textContent = '✅ ' + name + ' 写入成功 (偏移:0x' + offset.toString(16) + ', 值:' + val + ')';
                } else {
                    courtMsg.textContent = '❌ ' + name + ' 写入失败';
                }
            }

            courtSelect.addEventListener('change', () => {
                courtCurrentIdx = parseInt(courtSelect.value);
                const team = courtTeams[courtCurrentIdx];
                courtDisplay.textContent = team.name;
                courtMsg.textContent = '✅ 已切换到 ' + team.name;
            });

            document.getElementById('streetCourtTypeSelect').addEventListener('change', function() {
                const parts = this.value.split('|');
                document.getElementById('streetCourtInput').value = parts[0];
                document.getElementById('streetFloorInput').value = parts[1];
                courtMsg.textContent = '✅ 已选择 ' + this.options[this.selectedIndex].text + ' (球馆偏移:' + parts[0] + ', 地板偏移:' + parts[1] + ')';
            });

            writeCourtBtn.addEventListener('click', () => {
                writeCourtSingle(getCourtAddr(), courtInput.value.trim(), '球馆');
            });

            writeFloorBtn.addEventListener('click', () => {
                writeCourtSingle(getFloorAddr(), floorInput.value.trim(), '地板');
            });

            document.getElementById('writeStreetCourtBtn').addEventListener('click', function() {
                const str = document.getElementById('streetCourtInput').value.trim();
                if (!str) { courtMsg.textContent = '⚠️ 请输入数字'; return; }
                for (let ch of str) {
                    if (ch < '0' || ch > '9') {
                        courtMsg.textContent = '❌ 只支持数字 0-9';
                        return;
                    }
                }
                const baseAddr = getStreetBaseAddr();
                if (!baseAddr) { courtMsg.textContent = '❌ 街头球馆基址无效'; return; }
                const sel = document.getElementById('streetCourtTypeSelect');
                const parts = sel.value.split('|');
                const offsets = parts[0].split(',');
                let successCount = 0;
                offsets.forEach((offStr, index) => {
                    if (offStr.trim() === '') return;
                    const off = parseInt(offStr);
                    if (!isNaN(off)) {
                        const addr = baseAddr + BigInt(off);
                        const ch = index < str.length ? str[index] : '0';
                        const val = 48 + parseInt(ch);
                        if (writeI8(addr, val)) successCount++;
                    }
                });
                courtMsg.textContent = '✅ 街头球馆写入成功 (' + successCount + '/' + offsets.length + ' 个地址)';
            });

            document.getElementById('writeStreetFloorBtn').addEventListener('click', function() {
                const str = document.getElementById('streetFloorInput').value.trim();
                if (!str) { courtMsg.textContent = '⚠️ 请输入数字'; return; }
                for (let ch of str) {
                    if (ch < '0' || ch > '9') {

                        return;
                    }
                }
                const baseAddr = getStreetBaseAddr();
                if (!baseAddr) { courtMsg.textContent = '❌ 街头球馆基址无效'; return; }
                const sel = document.getElementById('streetCourtTypeSelect');
                const parts = sel.value.split('|');
                const offsets = parts[1] ? parts[1].split(',') : [];
                if (offsets.length === 0 || (offsets.length === 1 && offsets[0] === '')) {
                    courtMsg.textContent = '⚠️ 当前球场类型没有地板地址';
                    return;
                }
                let successCount = 0;
                offsets.forEach((offStr, index) => {
                    if (offStr.trim() === '') return;
                    const off = parseInt(offStr);
                    if (!isNaN(off)) {
                        const addr = baseAddr + BigInt(off);
                        const ch = index < str.length ? str[index] : '0';
                        const val = 48 + parseInt(ch);
                        if (writeI8(addr, val)) successCount++;
                    }
                });
                courtMsg.textContent = '✅ 街头地板写入成功 (' + successCount + '/' + offsets.length + ' 个地址)';
            });

            courtInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') writeCourtBtn.click(); });

                for (let i = 0; i < 6; i++) {

        function toggleLock() {
            if (!X || X.length === 0) { alert("请先进入游戏"); return; }
            var offsets = [
                [0x117EE10, 0x6F0], [0x117EE10, 0x6F4], [0x117F110, 0x700], [0x117F210, 0x6F8], [0x117F210, 0x700],
                [0x117F290, 0x6E8], [0x117F690, 0x6F8], [0x117F690, 0x700], [0x117F710, 0x6E8], [0x117F710, 0x6F0],
                [0x117F710, 0x6F8], [0x117F710, 0x700], [0x117F790, 0x6E8], [0x117F790, 0x6F0], [0x117F790, 0x6F8],
                [0x117F790, 0x700], [0x117F810, 0x6E8], [0x117F810, 0x6F0], [0x117F810, 0x6F8], [0x117F810, 0x700],
                [0x117F890, 0x6E8]
            ];
            if (!isLocked) {
                for (var i = 0; i < offsets.length; i++) {
                    var baseAddr = Number(X[0].start) + offsets[i][0];
                    var finalAddr = Number(h5gg.getValue(baseAddr, 'I64')) + offsets[i][1];
                    var currentValue = h5gg.getValue(finalAddr, 'I64');
                    if (currentValue !== null) {
                        let intervalId = setInterval((function(a, v) { return function() { h5gg.setValue(a, v, 'I64'); }; })(finalAddr, currentValue),
                        10);
                        intervals.push(intervalId);
                    }
                }
                isLocked = true;
                document.getElementById("lockStatus").innerHTML = "✅";
                alert("捏脸数值已锁定！");
            } else {
                for (var j = 0; j < intervals.length; j++) clearInterval(intervals[j]);
                intervals = [];
                isLocked = false;
                document.getElementById("lockStatus").innerHTML = "❎";
                alert("捏脸数值已解锁！");
            }
        }

        function toggleTrade() {
            if (!X || X.length === 0) { alert("请先进入游戏"); return; }
            var baseAddress = Number(X[0].start) + 0x17F9328;
            var offset1 = 0xE10,
                offset2 = 0xE28;
            var addr1 = Number(h5gg.getValue(baseAddress, 'I64')) + offset1;

                    const msgEl = document.getElementById('diyMsg');
                    if (!start) { msgEl.textContent = '❌ 地址无效';
                        msgEl.className = 'jersey-msg error'; return; }
                    const addr = start + BigInt(item.offset);
                    const val = diyReadByte(addr);
                    if (val !== null) { input.value = val;
                        msgEl.textContent = `✅ ${item.label} 读取成功`;
                        msgEl.className = 'jersey-msg'; } else { msgEl.textContent = `❌ 读取失败`;
                        msgEl.className = 'jersey-msg error'; }
                });

                const writeBtn = document.createElement('button');
                writeBtn.textContent = '写入';
                writeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const val = parseInt(input.value);
                    const msgEl = document.getElementById('diyMsg');
                    if (isNaN(val)) { msgEl.textContent = `❌ 请输入有效整数`;
                        msgEl.className = 'jersey-msg error'; return; }
                    const start = diyGetTargetAddr();
                    if (!start) { msgEl.textContent = '❌ 地址无效';
                        msgEl.className = 'jersey-msg error'; return; }
                    const addr = start + BigInt(item.offset);
                    if (diyWriteByte(addr, val)) {
                        msgEl.textContent = `✅ ${item.label} 写入成功 (${val})`;
                        msgEl.className = 'jersey-msg';
                    } else {
                        msgEl.textContent = `❌ 写入失败`;
                        msgEl.className = 'jersey-msg error';
                    }
                });

                div.appendChild(label);
                div.appendChild(input);
                div.appendChild(readBtn);
                div.appendChild(writeBtn);
                colorGrid.appendChild(div);
            });

            document.getElementById('jerseyTeamSelect').addEventListener('change', function() {
                jerseyCurrentTeamIdx = parseInt(this.value);
                jerseyUpdateStatus();
            });
            document.getElementById('jerseyHomeBtn').addEventListener('click', function() {
                jerseyIsHome = true;
                this.style.background = '#90EE90';
                document.getElementById('jerseyAwayBtn').style.background = '';
                jerseyUpdateStatus();
            });
            document.getElementById('jerseyAwayBtn').addEventListener('click', function() {
                jerseyIsHome = false;
                this.style.background = '#90EE90';
                document.getElementById('jerseyHomeBtn').style.background = '';
                jerseyUpdateStatus();
            });
            document.getElementById('jerseyWriteBtn').addEventListener('click', jerseyWriteString);
            document.getElementById('jerseyInputStr').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') jerseyWriteString();
            });

            document.getElementById('diyTeamSelect').addEventListener('change', function() {
                diyCurrentTeamIdx = parseInt(this.value);
                diyRefreshAll();
            });
            document.getElementById('diyHomeBtn').addEventListener('click', function() {
                diyIsHome = true;
                this.style.background = '#90EE90';
                document.getElementById('diyAwayBtn').style.background = '';
                diyRefreshAll();
            });
            document.getElementById('diyAwayBtn').addEventListener('click', function() {
                diyIsHome = false;
                this.style.background = '#90EE90';
                document.getElementById('diyHomeBtn').style.background = '';
                diyRefreshAll();
            });

            document.getElementById('diyReadAllBtn').addEventListener('click', diyReadAllColors);
            document.getElementById('diyWriteAllBtn').addEventListener('click', diyWriteAllColors);

            document.getElementById('diySwapBtn').addEventListener('click', function() {
                if (!X || X.length === 0) { alert("请先进入游戏"); return; }
                const addrs = diyComputeAddresses();
                const msgEl = document.getElementById('diyMsg');
                if (!addrs) {
                    msgEl.textContent = '❌ 地址无效';
                    msgEl.className = 'jersey-msg error';
                    return;
                }
                const home = addrs.home;
                const away = addrs.away;
                const homePrev = home - 1n;
                const awayPrev = away - 1n;
                const valHome = diyReadByte(homePrev);
                const valAway = diyReadByte(awayPrev);
                if (valHome === null || valAway === null) {
                    msgEl.textContent = '❌ 读取交换值失败';
                    msgEl.className = 'jersey-msg error';
                    return;
                }
                if (diyWriteByte(homePrev, valAway) && diyWriteByte(awayPrev, valHome)) {
                    msgEl.textContent = `✅ 主客场已互换 (主场: ${valAway}, 客场: ${valHome})`;
                    msgEl.className = 'jersey-msg';
                    diyColorOffsets.forEach(item => {
                        const inp = document.getElementById('diy_input_' + item.id);
                        if (inp) inp.value = '';
                    });
                } else {
                    msgEl.textContent = '❌ 交换写入失败';
                    msgEl.className = 'jersey-msg error';
                }
            });

            document.getElementById('diyEnableBtn').addEventListener('click', function() {
                if (!X || X.length === 0) { alert("请先进入游戏"); return; }
                const start = diyGetTargetAddr();
                const msgEl = document.getElementById('diyMsg');
                if (!start) { msgEl.textContent = '❌ 地址无效';
                    msgEl.className = 'jersey-msg error'; return; }
                if (diyWriteByte(start, 40)) {
                    msgEl.textContent = '✅ DIY已开启';
                    msgEl.className = 'jersey-msg';
                    diyColorOffsets.forEach(item => {
                        const inp = document.getElementById('diy_input_' + item.id);
                        if (inp) inp.value = '';
                    });
                } else {
                    msgEl.textContent = '❌ 开启DIY失败';
                    msgEl.className = 'jersey-msg error';
                }
            });

            jerseyUpdateStatus();
            setTimeout(diyRefreshAll, 300);
        }
